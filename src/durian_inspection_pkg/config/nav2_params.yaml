controller_server:
  ros__parameters:
    use_sim_time: True
    transform_tolerance: 0.5
    controller_frequency: 10.0  
    min_x_velocity_threshold: 0.001 
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    controller_plugins: ["FollowPath"]
    goal_checker_plugins: ["goal_checker"]
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3
      yaw_goal_tolerance: 1.5
      stateful: True
    current_goal_checker: "goal_checker"
    progress_checker_plugin: "progress_checker"
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 20.0
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      controller_frequency: 20.0
      desired_linear_vel: 0.08
      lookahead_dist: 1.0
      lookahead_time: 2.0
      use_velocity_scaled_lookahead_dist: False
      allow_reversing: False
      min_vel_x: 0.01
      rotation_fast_tolerance: 0.3
      max_linear_accel: 0.3
      max_linear_decel: 0.15
      min_lookahead_dist: 0.5
      max_angular_vel: 0.2
      critics: ["PathDist", "GoalDist"]
      PathDist.scale: 20.0  
      GoalDist.scale: 32.0
      path_distance_weight: 10.0 
      goal_distance_weight: 40.0
      
      max_robot_pose_search_dist: 2.0
      regulated_linear_velocity_scaling: True
      use_collision_detection: False
      collision_check_ahead_dist: 0.8
      inscribed_radius: 0.16
      inflation_radius: 0.25

planner_server:
  ros__parameters:
    use_sim_time: True
    transform_tolerance: 0.5
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      smooth_path: True
      tolerance: 0.5

bt_navigator:
  ros__parameters:
    use_sim_time: True
    bt_xml_filename: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_only_if_path_becomes_invalid.xml"
    action_server_timeout: 30.0 
    service_timeout: 30.0
    bt_loop_duration: 500
    default_server_timeout: 20
    replan_attempts_max: 5
    enable_groot_monitoring: False
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

behavior_server:
  ros__parameters:
    use_sim_time: True
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"

global_costmap:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    robot_radius: 0.15
    footprint_padding: 0.03
    update_frequency: 5.0
    publish_frequency: 2.0
    tf_buffer_duration: 5.0
    width: 30       
    height: 40      
    resolution: 0.05
    static_map: True
    always_send_full_costmap: True
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"
      map_subscribe_transient_local: True
      topic: /map
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: True
      observation_sources: tree_source
      tree_source:
        topic: /tree_cloud
        data_type: PointCloud2
        marking: True
        clearing: True
        min_obstacle_height: 0.1
        max_obstacle_height: 2.0
        obstacle_range: 1.5
        raytrace_range: 3.0
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      cost_scaling_factor: 2.0
      inflation_radius: 0.10


local_costmap:
  ros__parameters:
    use_sim_time: True
    global_frame: odom
    robot_base_frame: base_link
    rolling_window: True
    width: 10.0
    height: 10.0
    resolution: 0.05
    update_frequency: 5.0
    publish_frequency: 2.0
    robot_radius: 0.25
    footprint_padding: 0.03
    plugins: ["obstacle_layer","inflation_layer"] 
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      observation_sources: scan
      observation_persistence: 0.2
      expected_update_rate: 0.5
      scan:
        topic: /scan
        data_type: LaserScan
        sensor_frame: laser
        marking: true
        clearing: true
        footprint_clearing: True
        min_obstacle_height: 0.2 
        max_obstacle_height: 1.5 
        obstacle_max_range: 2.0  
        raytrace_max_range: 2.5
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      cost_scaling_factor: 2.0
      inflation_radius: 0.25

amcl:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    laser_frame_id: "laser"
    scan_topic: "/scan"
    map_topic: "/map"
    tf_broadcast: True
    transform_tolerance: 0.5 
    gui_publish_rate: 10.0
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    set_initial_pose: True
    initial_pose: {x: 0.0, y: 0.0, z: 0.0, yaw: 0.0}
    odom_model_type: "diff"
    resample_interval: 1
    min_particles: 1000
    max_particles: 5000
    update_min_d: 0.1 
    update_min_a: 0.1  
    odom_alpha1: 0.5
    odom_alpha2: 0.5
    odom_alpha3: 0.2
    odom_alpha4: 0.2
    initial_cov_xx: 0.5
    initial_cov_yy: 0.5
    initial_cov_aa: 0.5
    laser_min_range: 0.25
    laser_max_range: 5.0
    laser_max_beams: 180
    laser_likelihood_max_dist: 4.0
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0