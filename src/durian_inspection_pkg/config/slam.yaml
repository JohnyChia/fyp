slam_toolbox:
  ros__parameters:
    mode: mapping
    use_odom: true 
    odom_data_synced: true 
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    publish_tf: true
    odom_tf_admissible: true
    map_update_interval: 2.0 
    resolution: 0.05
    linear_update: 0.1      
    angular_update: 0.05
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_time_interval: 0.5
    minimum_score: 50.0 
    scan_buffer_size: 20
    tf_buffer_duration: 30.0
    transform_timeout: 0.5